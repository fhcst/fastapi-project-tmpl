services:
  app:
    build: .
    restart: unless-stopped
    # please only use volume binding in development environment.
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    environment:
      - FASTAPI_APP_ENVIRONMENT=${FASTAPI_APP_ENVIRONMENT}
      - SESSION_SECRET=${SESSION_SECRET}
      - MONGO_URL=mongodb://${MONGO_USER:-user}:${MONGO_PASSWORD:-password}@${DB_HOST:-mongodb}:${DB_PORT:-27017}/${MONGO_DB:-db}?authSource=admin
      - MONGO_DB=${MONGO_DB:-db}
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-db}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  dbgate:
    image: dbgate/dbgate
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - dbgate_data:/root/.dbgate
    environment:
      - CONNECTIONS=con1

      - LABEL_con1=MongoDB
      - URL_con1=mongodb://${MONGO_USER:-user}:${MONGO_PASSWORD:-password}@${DB_HOST:-mongodb}:${DB_PORT:-27017}/${MONGO_DB:-db}?authSource=admin
      - ENGINE_con1=mongo@dbgate-plugin-mongo
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    restart: unless-stopped
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data

  lakefs:
    image: treeverse/lakefs
    restart: unless-stopped
    profiles: ["lakefs"]
    ports:
      - "8001:8000"
    environment:
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=${LAKEFS_ENCRYPT_SECRET:-some-random-secret}
      - LAKEFS_DATABASE_TYPE=local
    volumes:
      - lakefs_data:/home/lakefs

volumes:
  mongodb_data:
  dbgate_data:
  redis_data:
  minio_data:
  lakefs_data:
